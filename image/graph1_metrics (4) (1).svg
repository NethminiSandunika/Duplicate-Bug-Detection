<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  
  <!-- White Background -->
  <rect x="0" y="0" width="1400" height="700" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#000">
    Model Performance Comparison
  </text>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="480" y="70" width="25" height="18" fill="#5B9BD5"/>
    <text x="510" y="83" font-family="Arial, sans-serif" font-size="14">Accuracy</text>
    
    <rect x="600" y="70" width="25" height="18" fill="#70AD47"/>
    <text x="630" y="83" font-family="Arial, sans-serif" font-size="14">Precision</text>
    
    <rect x="720" y="70" width="25" height="18" fill="#FFC000"/>
    <text x="750" y="83" font-family="Arial, sans-serif" font-size="14">Recall</text>
    
    <rect x="820" y="70" width="25" height="18" fill="#9966FF"/>
    <text x="850" y="83" font-family="Arial, sans-serif" font-size="14">F1-Score</text>
  </g>
  
  <!-- Y-axis -->
  <line x1="100" y1="120" x2="100" y2="580" stroke="#333" stroke-width="2"/>
  <text x="50" y="350" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" transform="rotate(-90 50 350)">Performance (%)</text>
  
  <!-- Y-axis labels -->
  <text x="85" y="585" font-family="Arial, sans-serif" font-size="12" text-anchor="end">75%</text>
  <line x1="95" y1="580" x2="100" y2="580" stroke="#333" stroke-width="1"/>
  
  <text x="85" y="493" font-family="Arial, sans-serif" font-size="12" text-anchor="end">80%</text>
  <line x1="95" y1="488" x2="100" y2="488" stroke="#333" stroke-width="1"/>
  
  <text x="85" y="401" font-family="Arial, sans-serif" font-size="12" text-anchor="end">85%</text>
  <line x1="95" y1="396" x2="100" y2="396" stroke="#333" stroke-width="1"/>
  
  <text x="85" y="309" font-family="Arial, sans-serif" font-size="12" text-anchor="end">90%</text>
  <line x1="95" y1="304" x2="100" y2="304" stroke="#333" stroke-width="1"/>
  
  <text x="85" y="217" font-family="Arial, sans-serif" font-size="12" text-anchor="end">95%</text>
  <line x1="95" y1="212" x2="100" y2="212" stroke="#333" stroke-width="1"/>
  
  <text x="85" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="end">100%</text>
  <line x1="95" y1="120" x2="100" y2="120" stroke="#333" stroke-width="1"/>
  
  <!-- X-axis -->
  <line x1="100" y1="580" x2="1350" y2="580" stroke="#333" stroke-width="2"/>
  <text x="725" y="630" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Models</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="488" x2="1350" y2="488" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="100" y1="396" x2="1350" y2="396" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="100" y1="304" x2="1350" y2="304" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="100" y1="212" x2="1350" y2="212" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- M1: LSTM -->
  <rect x="150" y="201" width="30" height="379" fill="#5B9BD5"/>
  <rect x="185" y="220" width="30" height="360" fill="#70AD47"/>
  <rect x="220" y="192" width="30" height="388" fill="#FFC000"/>
  <rect x="255" y="209" width="30" height="371" fill="#9966FF"/>
  <text x="217" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M1-LSTM</text>
  
  <!-- M2: CNN -->
  <rect x="350" y="220" width="30" height="360" fill="#5B9BD5"/>
  <rect x="385" y="243" width="30" height="337" fill="#70AD47"/>
  <rect x="420" y="210" width="30" height="370" fill="#FFC000"/>
  <rect x="455" y="229" width="30" height="351" fill="#9966FF"/>
  <text x="417" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M2-CNN</text>
  
  <!-- M3: LSTM+Metadata -->
  <rect x="550" y="167" width="30" height="413" fill="#5B9BD5"/>
  <rect x="585" y="188" width="30" height="392" fill="#70AD47"/>
  <rect x="620" y="150" width="30" height="430" fill="#FFC000"/>
  <rect x="655" y="171" width="30" height="409" fill="#9966FF"/>
  <text x="617" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M3-LSTM</text>
  <text x="617" y="627" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+Metadata</text>
  
  <!-- M4: Hybrid (CNN+LSTM+Attn) -->
  <rect x="750" y="219" width="30" height="361" fill="#5B9BD5"/>
  <rect x="785" y="242" width="30" height="338" fill="#70AD47"/>
  <rect x="820" y="208" width="30" height="372" fill="#FFC000"/>
  <rect x="855" y="228" width="30" height="352" fill="#9966FF"/>
  <text x="817" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M4-Hybrid</text>
  <text x="817" y="627" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">(CNN+LSTM+Attn)</text>
  
  <!-- M5: Hybrid+Attention+Metadata -->
  <rect x="950" y="182" width="30" height="398" fill="#5B9BD5"/>
  <rect x="985" y="203" width="30" height="377" fill="#70AD47"/>
  <rect x="1020" y="167" width="30" height="413" fill="#FFC000"/>
  <rect x="1055" y="185" width="30" height="395" fill="#9966FF"/>
  <text x="1017" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M5-Hybrid+Attn</text>
  <text x="1017" y="627" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+Metadata</text>
  
  <!-- M6: LSTM+CNN+Metadata (BEST) -->
  <rect x="1150" y="163" width="30" height="417" fill="#5B9BD5"/>
  <rect x="1185" y="183" width="30" height="397" fill="#70AD47"/>
  <rect x="1220" y="161" width="30" height="419" fill="#FFC000"/>
  <rect x="1255" y="168" width="30" height="412" fill="#9966FF"/>
  
  <!-- Star marker for M6 -->
  <text x="1217" y="145" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#FFD700">★</text>
  
  <!-- Values on top of M6 bars -->
  <text x="1165" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">93.13%</text>
  <text x="1200" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">91.74%</text>
  <text x="1235" y="153" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">93.34%</text>
  <text x="1270" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">92.53%</text>
  
  <text x="1217" y="612" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">M6-LSTM+CNN</text>
  <text x="1217" y="627" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+Metadata ★</text>
  
</svg>